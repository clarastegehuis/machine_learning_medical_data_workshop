name: Deploy JupyterLite to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install JupyterLite builder
        run: |
          python -m pip install --upgrade pip
          pip install "jupyterlite-core[contents]==0.4.*" jupyterlite-pyodide-kernel==0.4.*

      - name: Stage notebooks and assets as JupyterLite contents
        run: |
          rm -rf files
          mkdir -p files
          cp welkom.ipynb files/
          cp workshop_convolutie_geen_ai_jupyterlite.ipynb files/
          cp workshop_utils.py files/
          cp chess.jpg files/ || true
          cp woman.jpg files/ || true

      - name: Build JupyterLite site
        run: |
          jupyter lite build --config jupyter_lite_config.json --output-dir dist

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
